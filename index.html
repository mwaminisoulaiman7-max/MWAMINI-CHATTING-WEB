<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWAMINI CHAT WEB</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <h2 class="brand-title">MWAMINI CHAT WEB</h2>
            
            <p id="error-message" class="error-text"></p>

            <form id="auth-form-fields">
                <div class="input-group" id="name-group">
                    <input type="text" id="auth-name" placeholder="Full Name">
                </div>
                <div class="input-group">
                    <input type="email" id="auth-email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <input type="password" id="auth-password" placeholder="Password" required>
                </div>
                
                <div id="forgot-password-container" class="hidden" style="text-align: right; margin-bottom: 15px;">
                    <span id="auth-forgot-link" style="color: #667781; font-size: 13px; cursor: pointer; text-decoration: underline;">Forgot Password?</span>
                </div>

                <button type="submit" id="auth-submit-btn" class="btn-primary">Register</button>
            </form>

            <p id="toggle-container" style="margin-top: 20px; text-align: center; font-size: 14px; color: #667781;">
                <span id="auth-switch-text">Already have an account?</span> 
                <span id="auth-switch-link" class="support-link">Login here</span>
            </p>
            
            <div class="or-separator">
                <div class="line"></div>
                <span>OR</span>
                <div class="line"></div>
            </div>
            
            <button type="button" id="guest-login-btn" class="btn-secondary-guest">Enter via Guest Mode</button>

            <div class="support-footer">
                Having issues? <a href="mailto:support@example.com" class="support-link">Contact Support</a>
            </div>
        </div>
    </div>
    <script type="module" src="./auth.js"></script>
</body>
</html>
