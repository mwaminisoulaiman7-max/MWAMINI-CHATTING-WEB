<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWAMINI CHAT WEB - Workspace Upgrade</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="app-window">
        <aside class="sidebar-left">
            <header class="sidebar-header">
                <div>
                    <h3 id="current-user-title">MWAMINI WORKSPACE</h3>
                    <p id="my-status-display" class="presence-status-text">Connecting...</p>
                </div>
                <button id="logout-btn" class="btn-logout">Exit</button>
            </header>

            <div class="status-updater-tray">
                <input type="text" id="status-input" placeholder="Update your status story...">
                <button id="update-status-btn">Post</button>
            </div>

            <div class="group-creation-box">
                <label>LAUNCH NEW CHAT ROOM</label>
                <input type="text" id="group-name-input" placeholder="Room Name Label...">
                <select id="group-type-select">
                    <option value="public">🌐 Public Room (Open Access)</option>
                    <option value="protected">🔒 Protected Room (Password Gate)</option>
                </select>
                <input type="password" id="group-password-input" placeholder="Set Access Password Token..." class="hidden">
                <button id="create-group-btn" class="btn-group-create">Create & Publish Channel</button>
            </div>

            <div class="search-box">
                <input type="text" id="search-users" placeholder="Search direct users or shared groups...">
            </div>
            
            <div class="user-list" id="users-container"></div>
        </aside>

        <main class="chat-panel" id="chat-panel-view">
            <div id="no-chat-selected" class="welcome-screen">
                <div class="welcome-hero-art">💬</div>
                <h2 class="welcome-title">Mwamini <strong>Secure Connect</strong></h2>
                <p class="welcome-subtitle">Select a contact profile or launch an upgrade group channel. Invite teammates and verify entry access codes seamlessly in real-time.</p>
            </div>

            <div id="active-chat-area" class="chat-area hidden">
                <header class="chat-header">
                    <div>
                        <span id="chat-header-group-meta" class="room-meta-info"></span>
                        <div style="display: flex; align-items: center; gap: 4px;">
                            <h3 id="chat-header-name">Active Session</h3>
                        </div>
                    </div>
                </header>
                
                <div class="message-stream" id="message-stream"></div>
                
                <footer class="chat-input-bar">
                    <button type="button" id="voice-record-btn" class="file-attach-btn" title="Record Audio">🎤</button>
                    <span id="voice-recording-status" class="hidden" style="color: #ea0038; font-size: 10px; font-weight: bold;">● RECORDING</span>
                    <form id="message-form" style="display: flex; flex: 1; gap: 12px; margin: 0;">
                        <input type="text" id="message-input" placeholder="Write a secure transmission..." autocomplete="off">
                        <button type="submit" class="btn-send">Send</button>
                    </form>
                </footer>
            </div>
        </main>
    </div>
    <script type="module" src="./app.js"></script>
</body>
</html>
